<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Aniversário Gabbessy!</title>
    <style>
        body { background-color: #0b0b0b; color: white; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .typing { border-right: 3px solid #00ff41; white-space: nowrap; overflow: hidden; width: 0; animation: typing 3s steps(30, end) forwards, blink 0.8s infinite; font-size: 1.2rem; color: #00ff41; }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: #00ff41; } }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; width: 100%; max-width: 800px; margin-top: 30px; }
        img { width: 100%; border-radius: 8px; border: 2px solid #7B2CBF; transition: 0.3s; }
        img:hover { transform: scale(1.05); }
        .music { margin-top: 30px; width: 100%; max-width: 400px; }
    </style>
</head>
<body>

    <h1 class="typing">Parabéns, Gabbessy (Liz)!</h1>
    <p>"Eu eu eu não sei... mas parabéns!"</p>

    <div class="music">
        <iframe width="100%" height="180" src="https://www.youtube.com/embed/oAur1xQx-sc" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <div class="gallery">
        <img src="https://images3.alphacoders.com/511/thumb-1920-51109.jpg" alt="Eva">
        <img src="https://images5.alphacoders.com/117/1178776.jpg" alt="Bloom">
        <img src="https://wallpapers.com/images/featured/evangelion-ia5qgwb2kaalx8lm.jpg" alt="Eva 2">
        <img src="https://images7.alphacoders.com/117/thumb-1920-1178790.jpg" alt="Bloom 2">
    </div>

</body>
</html>
